<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product List</title>

  <style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Segoe UI',sans-serif;
    }

    body{
        min-height:100vh;
        overflow-x:hidden;
        background:#0f172a;
        padding:30px;
    }

    /* CINEMATIC BACKGROUND */
    body::before,
    body::after{
        content:"";
        position:absolute;
        width:500px;
        height:500px;
        border-radius:50%;
        filter:blur(130px);
        opacity:.7;
        z-index:0;
        animation:float 12s infinite ease-in-out;
    }

    body::before{
        background:#7c3aed;
        top:-150px;
        left:-120px;
    }

    body::after{
        background:#06b6d4;
        bottom:-150px;
        right:-120px;
        animation-delay:4s;
    }

    .container{
        position:relative;
        z-index:1;
        max-width:1400px;
        margin:auto;

        background:rgba(255,255,255,0.08);
        backdrop-filter:blur(25px);

        border:1px solid rgba(255,255,255,0.15);

        border-radius:28px;

        padding:35px;

        box-shadow:
            0 30px 80px rgba(0,0,0,0.6),
            inset 0 1px 0 rgba(255,255,255,0.1);

        animation:fadeIn 0.8s ease;
    }

    h1{
        text-align:center;
        font-size:3rem;
        color:white;
        text-shadow:
            0 0 15px rgba(255,255,255,0.5),
            0 0 30px rgba(124,58,237,0.6);
        margin-bottom:10px;
    }

    .subtitle{
        text-align:center;
        color:#cbd5e1;
        margin-bottom:25px;
    }

    .top-bar{
        display:flex;
        justify-content:center;
        gap:15px;
        flex-wrap:wrap;
        margin-bottom:25px;
    }

    .btn{
        text-decoration:none;
        color:white;
        padding:14px 24px;
        border-radius:14px;
        font-weight:600;
        transition:.3s;
    }

    .btn:hover{
        transform:translateY(-5px);
    }

    .home-btn{
        background:linear-gradient(135deg,#3b82f6,#06b6d4);
        box-shadow:0 10px 30px rgba(59,130,246,0.3);
    }

    .add-btn{
        background:linear-gradient(135deg,#10b981,#34d399);
        box-shadow:0 10px 30px rgba(16,185,129,0.3);
    }

    .reset-btn{
        background:linear-gradient(135deg,#f97316,#ef4444);
        box-shadow:0 10px 30px rgba(239,68,68,0.3);
    }

    .search-box{
        display:flex;
        gap:12px;
        margin-bottom:25px;
    }

    .search-box input{
        flex:1;
        padding:16px;
        border-radius:14px;
        border:none;
        background:rgba(255,255,255,0.1);
        color:white;
        outline:none;
        backdrop-filter:blur(10px);
    }

    .search-box input::placeholder{
        color:#cbd5e1;
    }

    .search-box button{
        padding:16px 22px;
        border:none;
        border-radius:14px;
        cursor:pointer;
        font-weight:600;
        color:white;
        background:linear-gradient(135deg,#f97316,#ef4444);
        transition:.3s;
    }

    .search-box button:hover{
        transform:scale(1.05);
    }

    .count{
        margin-bottom:15px;
        color:#cbd5e1;
        font-weight:600;
    }

    table{
        width:100%;
        border-collapse:separate;
        border-spacing:0 12px;
    }

    thead th{
        padding:16px;
        color:white;
        background:linear-gradient(135deg,#4f46e5,#7c3aed);
    }

    thead th:first-child{
        border-radius:14px 0 0 14px;
    }

    thead th:last-child{
        border-radius:0 14px 14px 0;
    }

    tbody tr{
        background:rgba(255,255,255,0.08);
        transition:.3s;
        backdrop-filter:blur(10px);
    }

    tbody tr:hover{
        transform:translateY(-6px) scale(1.01);
        box-shadow:0 20px 40px rgba(0,0,0,0.4);
    }

    td{
        padding:16px;
        text-align:center;
        color:white;
        vertical-align:middle;
    }

    img{
        width:75px;
        height:75px;
        object-fit:cover;
        border-radius:14px;
        transition:.3s;
    }

    img:hover{
        transform:scale(1.15) rotateY(10deg);
    }

    .no-img{
        color:#94a3b8;
    }

    .action{
        display:flex;
        justify-content:center;
        gap:8px;
        flex-wrap:wrap;
    }

    .action a{
        text-decoration:none;
        color:white;
        padding:8px 12px;
        border-radius:10px;
        font-size:13px;
        font-weight:600;
        transition:.3s;
    }

    .action a:hover{
        transform:translateY(-3px);
    }

    .view{ background:#06b6d4; }
    .edit{ background:#10b981; }
    .delete{ background:#ef4444; }

    .empty{
        text-align:center;
        padding:40px;
        color:#cbd5e1;
    }

    @keyframes fadeIn{
        from{opacity:0; transform:translateY(20px);}
        to{opacity:1; transform:translateY(0);}
    }

    @keyframes float{
        0%,100%{transform:translateY(0);}
        50%{transform:translateY(-70px);}
    }

    @media(max-width:768px){

        .search-box{
            flex-direction:column;
        }

        .btn{
            width:100%;
            text-align:center;
        }

        table{
            min-width:900px;
        }
    }

  </style>

</head>

<body>

<div class="container">

  <h1>🛍 Product Management</h1>

  <div class="subtitle">
    Cinematic 3D Admin Dashboard
  </div>

  <div class="top-bar">

    <a th:href="@{/}" class="btn home-btn">🏠 Home</a>
    <a th:href="@{/products/new}" class="btn add-btn">➕ Add Product</a>
    <a th:href="@{/products}" class="btn reset-btn">🔄 Reset</a>

  </div>

  <form th:action="@{/products/search}" method="get" class="search-box">

    <input type="text"
           name="keyword"
           placeholder="🔍 Search products...">

    <button type="submit">Search</button>

  </form>

  <div class="count">
    📦 Total Products: <span th:text="${#lists.size(products)}"></span>
  </div>

  <table>

    <thead>
    <tr>
      <th>Image</th>
      <th>Name</th>
      <th>Price</th>
      <th>Stock</th>
      <th>Details</th>
      <th>Actions</th>
    </tr>
    </thead>

    <tbody>

    <tr th:if="${#lists.isEmpty(products)}">
      <td colspan="6" class="empty">
        No Products Found 😢
      </td>
    </tr>

    <tr th:each="p : ${products}">

      <td>
        <img th:if="${p.imagename != null}"
             th:src="@{'/uploads/' + ${p.imagename}}">

        <span th:if="${p.imagename == null}" class="no-img">
          No Image
        </span>
      </td>

      <td th:text="${p.name}"></td>
      <td>₹ <span th:text="${p.price}"></span></td>
      <td th:text="${p.stock}"></td>
      <td th:text="${p.details}"></td>

      <td>
        <div class="action">

          <a th:href="@{'/products/view/' + ${p.id}}" class="view">View</a>
          <a th:href="@{'/products/edit/' + ${p.id}}" class="edit">Edit</a>
          <a th:href="@{'/products/delete/' + ${p.id}}" class="delete">Delete</a>

        </div>
      </td>

    </tr>

    </tbody>

  </table>

</div>

</body>
</html>
