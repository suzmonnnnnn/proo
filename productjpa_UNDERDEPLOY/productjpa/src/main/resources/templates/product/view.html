<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details</title>

  <style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Segoe UI',sans-serif;
    }

    body{
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        overflow:hidden;
        background:#0f172a;
        perspective:1500px;
    }

    /* CINEMATIC BACKGROUND ORBS */
    body::before,
    body::after{
        content:"";
        position:absolute;
        border-radius:50%;
        filter:blur(120px);
        opacity:.7;
        animation:float 12s infinite ease-in-out;
        z-index:0;
    }

    body::before{
        width:500px;
        height:500px;
        background:#7c3aed;
        top:-150px;
        left:-120px;
    }

    body::after{
        width:450px;
        height:450px;
        background:#06b6d4;
        bottom:-150px;
        right:-120px;
        animation-delay:4s;
    }

    .card{
        position:relative;
        z-index:1;
        width:95%;
        max-width:950px;

        background:rgba(255,255,255,0.08);
        backdrop-filter:blur(25px);

        border:1px solid rgba(255,255,255,0.15);

        border-radius:30px;

        overflow:hidden;

        box-shadow:
            0 30px 80px rgba(0,0,0,0.6),
            inset 0 1px 0 rgba(255,255,255,0.1);

        transform:rotateX(8deg);

        transform-style:preserve-3d;

        animation:cardFloat 6s ease-in-out infinite;
    }

    .header{
        text-align:center;
        padding:35px;
        background:linear-gradient(
            135deg,
            rgba(124,58,237,0.9),
            rgba(6,182,212,0.9)
        );
        color:white;
    }

    .header h1{
        font-size:2.8rem;
        font-weight:800;
        text-shadow:
            0 0 15px rgba(255,255,255,0.6),
            0 0 30px rgba(124,58,237,0.6);
    }

    .content{
        display:flex;
        gap:40px;
        padding:40px;
        align-items:center;
        transform:translateZ(40px);
    }

    .image-section{
        flex:1;
        text-align:center;
    }

    .image-section img{
        width:340px;
        height:340px;
        object-fit:cover;
        border-radius:22px;

        box-shadow:
            0 20px 40px rgba(0,0,0,0.4);

        transition:.4s;
    }

    .image-section img:hover{
        transform:scale(1.08) rotateY(8deg);
    }

    .no-image{
        width:340px;
        height:340px;
        border-radius:22px;
        background:rgba(255,255,255,0.08);
        border:2px dashed rgba(255,255,255,0.3);
        display:flex;
        justify-content:center;
        align-items:center;
        color:#cbd5e1;
        font-size:1.2rem;
    }

    .details-section{
        flex:1;
        display:flex;
        flex-direction:column;
        gap:15px;
    }

    .info-box{
        background:rgba(255,255,255,0.08);
        border:1px solid rgba(255,255,255,0.15);
        padding:18px 20px;
        border-radius:16px;

        transition:.3s;
    }

    .info-box:hover{
        transform:translateX(8px) translateZ(20px);
        background:rgba(255,255,255,0.12);
    }

    .label{
        display:block;
        font-size:12px;
        letter-spacing:2px;
        text-transform:uppercase;
        color:#a5b4fc;
        margin-bottom:6px;
    }

    .value{
        font-size:1.1rem;
        color:white;
        word-break:break-word;
    }

    .price{
        font-size:1.8rem;
        font-weight:800;
        color:#22c55e;
        text-shadow:0 0 10px rgba(34,197,94,0.5);
    }

    .footer{
        text-align:center;
        padding:0 40px 40px;
    }

    .btn{
        display:inline-block;
        text-decoration:none;
        padding:16px 32px;
        border-radius:16px;
        color:white;
        font-weight:700;

        background:linear-gradient(
            135deg,
            #f97316,
            #ef4444
        );

        box-shadow:0 15px 35px rgba(239,68,68,0.4);

        transition:.3s;
    }

    .btn:hover{
        transform:translateY(-6px) scale(1.05);
    }

    /* ANIMATIONS */
    @keyframes float{
        0%,100%{transform:translateY(0);}
        50%{transform:translateY(-80px);}
    }

    @keyframes cardFloat{
        0%,100%{
            transform:rotateX(8deg) translateY(0);
        }
        50%{
            transform:rotateX(8deg) translateY(-12px);
        }
    }

    /* RESPONSIVE */
    @media(max-width:768px){

        .content{
            flex-direction:column;
        }

        .image-section img,
        .no-image{
            width:100%;
            max-width:300px;
            height:300px;
        }

        .header h1{
            font-size:2rem;
        }
    }

  </style>

</head>

<body>

<div class="card">

  <div class="header">
    <h1>📦 Product Details</h1>
  </div>

  <div class="content">

    <div class="image-section">

      <img th:if="${product.imagename != null}"
           th:src="@{'/uploads/' + ${product.imagename}}"
           alt="Product Image">

      <div class="no-image"
           th:if="${product.imagename == null}">
        No Image Available
      </div>

    </div>

    <div class="details-section">

      <div class="info-box">
        <span class="label">Product Name</span>
        <div class="value" th:text="${product.name}"></div>
      </div>

      <div class="info-box">
        <span class="label">Price</span>
        <div class="value price">
          ₹ <span th:text="${product.price}"></span>
        </div>
      </div>

      <div class="info-box">
        <span class="label">Stock</span>
        <div class="value" th:text="${product.stock}"></div>
      </div>

      <div class="info-box">
        <span class="label">Description</span>
        <div class="value" th:text="${product.details}"></div>
      </div>

    </div>

  </div>

  <div class="footer">
    <a th:href="@{/products}" class="btn">
      ← Back to Products
    </a>
  </div>

</div>

</body>
</html>
